services:
  zippergui:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ZIP_ROOT=/data
      - ZIP_OUTPUT_DIR=/output
      - MAX_BROWSE_DEPTH=5
      - JOB_STORE_PATH=/output/jobs.json
      - ZIP_RETENTION_DAYS=0
      - RETENTION_SCAN_MS=60000
    volumes:
      - ./data:/data
      - ./output:/output
