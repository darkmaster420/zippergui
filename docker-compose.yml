services:
  zippergui:
    image: ${IMAGE_NAME:-ghcr.io/darkmaster420/zippergui:latest}
    container_name: zippergui
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      - ZIP_ROOT=/data
      - ZIP_OUTPUT_DIR=/output
      - MAX_BROWSE_DEPTH=${MAX_BROWSE_DEPTH:-5}
      - JOB_STORE_PATH=/output/jobs.json
      - ZIP_RETENTION_DAYS=${ZIP_RETENTION_DAYS:-0}
      - RETENTION_SCAN_MS=${RETENTION_SCAN_MS:-60000}
      - ALLOW_SOURCE_DELETE=${ALLOW_SOURCE_DELETE:-false}
    volumes:
      - ${DATA_PATH:-./data}:/data
      - ${OUTPUT_PATH:-./output}:/output
